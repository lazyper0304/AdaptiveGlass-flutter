name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android"
        required: false
        default: true
        type: boolean
      build_web:
        description: "Build Web"
        required: false
        default: true
        type: boolean
      build_windows:
        description: "Build Windows"
        required: false
        default: true
        type: boolean
      build_linux:
        description: "Build Linux"
        required: false
        default: true
        type: boolean
      tag:
        description: "tag"
        required: false
        default: ""
        type: string

jobs:
  android:
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.build_android == 'true' }}
    uses: ./.github/workflows/android.yml
    permissions: write-all
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

  web:
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.build_web == 'true' }}
    uses: ./.github/workflows/web.yml
    permissions: write-all

  windows:
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.build_windows == 'true' }}
    uses: ./.github/workflows/windows.yml
    permissions: write-all

  linux:
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.build_linux == 'true' }}
    uses: ./.github/workflows/linux.yml
    permissions: write-all
