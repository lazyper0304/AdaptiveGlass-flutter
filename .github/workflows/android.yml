name: Build for Android

on:
  workflow_call:
    inputs:
      tag:
        description: "tag"
        required: false
        default: ""
        type: string
  workflow_dispatch:

jobs:
  build-android:
    name: Release Android
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.x"
          cache: true

      - name: Debug secrets
        run: |
          echo "=== Secrets Debug ==="
          echo "KEYSTORE_BASE64 exists: ${{ secrets.KEYSTORE_BASE64 != '' }}"
          echo "KEYSTORE_PASSWORD exists: ${{ secrets.KEYSTORE_PASSWORD != '' }}"
          echo "KEY_ALIAS exists: ${{ secrets.KEY_ALIAS != '' }}"
          echo "KEY_PASSWORD exists: ${{ secrets.KEY_PASSWORD != '' }}"
          echo "=== Environment ==="
          echo "Current directory: $(pwd)"
          echo "User: $(whoami)"

      - name: Write signing config
        run: |
          SECRET_LENGTH=$(echo -n "${{ secrets.KEYSTORE_BASE64 }}" | wc -c)
          echo "KEYSTORE_BASE64 length: $SECRET_LENGTH"
          if [ "$SECRET_LENGTH" -gt 0 ]; then
            mkdir -p android/app
            echo -n "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/key.jks
            echo "Keystore file created"
            ls -la android/app/key.jks
            echo "storeFile=${{ github.workspace }}/android/app/key.jks" > android/key.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
            cat android/key.properties
            keytool -list -v -keystore android/app/key.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>&1 || echo "Keystore verification failed"
          else
            echo "WARNING: KEYSTORE_BASE64 is empty or not set"
          fi

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Rename artifacts
        run: |
          for file in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
            mv "$file" "adaptive_glass_${abi}.apk"
          done
        shell: bash

      - name: Release
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          files: |
            adaptive_glass_*.apk

      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: Android-arm64-v8a
          path: adaptive_glass_arm64-v8a.apk

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: Android-armeabi-v7a
          path: adaptive_glass_armeabi-v7a.apk

      - name: Upload x86_64
        uses: actions/upload-artifact@v4
        with:
          name: Android-x86_64
          path: adaptive_glass_x86_64.apk
